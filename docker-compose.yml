version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: snapfix-postgres
    environment:
      POSTGRES_DB: snapfix
      POSTGRES_USER: snapfix_user
      POSTGRES_PASSWORD: snapfix_password
      TZ: Asia/Kolkata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - snapfix-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snapfix_user -d snapfix"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: snapfix-backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/snapfix
      SPRING_DATASOURCE_USERNAME: snapfix_user
      SPRING_DATASOURCE_PASSWORD: snapfix_password
      JWT_SECRET: your-super-secret-jwt-key-change-this-in-production
      JWT_EXPIRATION: 86400000
      TZ: Asia/Kolkata
      SPRING_MAIL_HOST: smtp.gmail.com
      SPRING_MAIL_PORT: 587
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-update12@snapfixindia.space}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-hritjrevbanzvtnw}
      # CORS configuration for ngrok
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - snapfix-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:8080/api}
    container_name: snapfix-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - snapfix-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Ngrok - Expose services for testing
  ngrok:
    image: ngrok/ngrok:latest
    container_name: snapfix-ngrok
    command:
      - start
      - --all
      - --config
      - /etc/ngrok.yml
    ports:
      - "4040:4040"  # Ngrok web interface
    volumes:
      - ./ngrok.yml:/etc/ngrok.yml:ro
    depends_on:
      - frontend
      - backend
    networks:
      - snapfix-network
    restart: unless-stopped

  # Optional: Database Dashboard
  db-dashboard:
    build:
      context: ./db-dashboard
      dockerfile: Dockerfile
    container_name: snapfix-db-dashboard
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: snapfix
      DB_USER: snapfix_user
      DB_PASSWORD: snapfix_password
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - snapfix-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local

networks:
  snapfix-network:
    driver: bridge


