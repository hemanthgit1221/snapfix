version: "2"
authtoken: YOUR_NGROK_AUTH_TOKEN_HERE  # Get from https://dashboard.ngrok.com/get-started/your-authtoken

tunnels:
  frontend:
    proto: http
    addr: frontend:80
    inspect: true
    
  backend:
    proto: http
    addr: backend:8080
    inspect: true
    
  db-dashboard:
    proto: http
    addr: db-dashboard:3001
    inspect: true









