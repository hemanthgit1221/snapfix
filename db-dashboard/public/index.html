<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapFix Database Dashboard</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            padding: 15px;
            box-sizing: border-box;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }

        .header h1 {
            color: #4a5568;
            margin-bottom: 8px;
            font-size: 1.5rem;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #48bb78;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        @media (min-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }

        .card h3 {
            color: #4a5568;
            margin-bottom: 12px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 8px;
            font-size: 1.1rem;
        }

        .table-list {
            list-style: none;
        }

        .table-item {
            background: #f7fafc;
            margin: 6px 0;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 4px solid #4299e1;
            font-size: 0.9rem;
        }

        .table-item:hover {
            background: #e2e8f0;
            transform: translateX(5px);
        }

        .table-item.active {
            background: #4299e1;
            color: white;
        }

        .query-log {
            max-height: 300px;
            overflow-y: auto;
        }

        .query-item {
            background: #f7fafc;
            margin: 6px 0;
            padding: 10px;
            border-radius: 6px;
            border-left: 4px solid #48bb78;
            font-family: 'Courier New', monospace;
            font-size: 11px;
        }

        .query-item.website {
            border-left-color: #4299e1;
            background: #ebf8ff;
        }

        .query-item.dashboard {
            border-left-color: #48bb78;
            background: #f0fff4;
        }

        .query-item.error {
            border-left-color: #f56565;
            background: #fed7d7;
        }

        .query-item.executing {
            border-left-color: #ed8936;
            background: #feebc8;
        }

        .query-item.active {
            border-left-color: #9f7aea;
            background: #faf5ff;
        }

        .query-item.activity {
            border-left-color: #38b2ac;
            background: #e6fffa;
        }

        .table-container {
            width: 100%;
            overflow-x: auto;
            margin-top: 12px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .data-table {
            width: 100%;
            min-width: 600px;
            border-collapse: collapse;
            font-size: 0.8rem;
            background: white;
        }

        .data-table th,
        .data-table td {
            padding: 6px 8px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
            border-right: 1px solid #f1f5f9;
            word-wrap: break-word;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 150px;
        }

        .data-table th {
            background: #f8fafc;
            font-weight: 600;
            color: #475569;
            font-size: 0.75rem;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .data-table tr:hover {
            background: #f8fafc;
        }

        .data-table tr:nth-child(even) {
            background: #fafbfc;
        }

        .data-table tr:nth-child(even):hover {
            background: #f1f5f9;
        }

        /* Special handling for long content */
        .data-table td.long-content {
            white-space: normal;
            max-width: 200px;
            word-break: break-word;
        }

        .data-table td.id-column {
            max-width: 80px;
            font-weight: 600;
            color: #3b82f6;
        }

        .data-table td.status-column {
            max-width: 100px;
        }

        .data-table td.date-column {
            max-width: 120px;
            font-size: 0.75rem;
        }

        .query-input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            margin-bottom: 8px;
            box-sizing: border-box;
        }

        .btn {
            background: #4299e1;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            margin-right: 10px;
            margin-bottom: 5px;
        }

        .btn:hover {
            background: #3182ce;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #f56565;
        }

        .btn-danger:hover {
            background: #e53e3e;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }

        .stat-number {
            font-size: 1.5em;
            font-weight: bold;
            color: #4299e1;
        }

        .stat-label {
            color: #718096;
            margin-top: 5px;
            font-size: 0.8rem;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .timestamp {
            color: #718096;
            font-size: 10px;
        }

        .duration {
            color: #48bb78;
            font-weight: bold;
            font-size: 10px;
        }

        /* Mobile responsiveness */
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .header {
                padding: 12px;
            }
            
            .header h1 {
                font-size: 1.3rem;
            }
            
            .card {
                padding: 12px;
            }
            
            .card h3 {
                font-size: 1rem;
            }
            
            .stats {
                grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
                gap: 8px;
            }
            
            .stat-card {
                padding: 12px;
            }
            
            .stat-number {
                font-size: 1.3em;
            }
            
            .table-container {
                margin-top: 10px;
            }
            
            .data-table {
                font-size: 0.7rem;
                min-width: 500px;
            }
            
            .data-table th,
            .data-table td {
                padding: 4px 6px;
                max-width: 120px;
            }
            
            .data-table th {
                font-size: 0.7rem;
            }
            
            .query-input {
                font-size: 11px;
                padding: 8px;
            }
            
            .btn {
                padding: 8px 16px;
                font-size: 0.8rem;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 8px;
            }
            
            .header h1 {
                font-size: 1.2rem;
            }
            
            .stats {
                grid-template-columns: 1fr 1fr;
            }
            
            .data-table {
                min-width: 400px;
                font-size: 0.65rem;
            }
            
            .data-table th,
            .data-table td {
                max-width: 80px;
                padding: 3px 4px;
            }
            
            .data-table th {
                font-size: 0.65rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🗄️ SnapFix Database Dashboard</h1>
            <div class="status">
                <div class="status-dot"></div>
                <span>Connected to PostgreSQL Database</span>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalTables">-</div>
                <div class="stat-label">Tables</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalQueries">0</div>
                <div class="stat-label">Queries Executed</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="activeConnections">1</div>
                <div class="stat-label">Active Connections</div>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="card">
                <h3>📋 Database Tables</h3>
                <ul class="table-list" id="tableList">
                    <li>Loading tables...</li>
                </ul>
            </div>

            <div class="card">
                <h3>⚡ Real-time Query Log</h3>
                <div class="query-log" id="queryLog">
                    <div class="query-item">Waiting for queries...</div>
                </div>
            </div>
        </div>

        <div class="card full-width">
            <h3>🔍 Custom Query Executor</h3>
            <textarea class="query-input" id="customQuery" placeholder="Enter your SQL query here..."></textarea>
            <button class="btn" onclick="executeCustomQuery()">Execute Query</button>
            <button class="btn btn-danger" onclick="clearQueryLog()">Clear Log</button>
        </div>

        <div class="card full-width" id="tableDataCard" style="display: none;">
            <h3 id="tableDataTitle">Table Data</h3>
            <div id="tableData">
                <!-- Table data will be loaded here -->
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let queryCount = 0;

        // Load tables on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadTables();
        });

        // Socket event listeners
        socket.on('queryLog', function(queryEntry) {
            addQueryToLog(queryEntry);
        });

        socket.on('queryUpdate', function(queryEntry) {
            updateQueryInLog(queryEntry);
        });

        // Load database tables
        async function loadTables() {
            try {
                const response = await fetch('/api/tables');
                const tables = await response.json();
                
                const tableList = document.getElementById('tableList');
                const totalTables = document.getElementById('totalTables');
                
                totalTables.textContent = tables.length;
                tableList.innerHTML = '';
                
                tables.forEach(table => {
                    const li = document.createElement('li');
                    li.className = 'table-item';
                    li.textContent = table.table_name;
                    li.onclick = () => loadTableData(table.table_name);
                    tableList.appendChild(li);
                });
            } catch (error) {
                console.error('Error loading tables:', error);
            }
        }

        // Load table data
        async function loadTableData(tableName) {
            try {
                // Update active table
                document.querySelectorAll('.table-item').forEach(item => {
                    item.classList.remove('active');
                });
                event.target.classList.add('active');

                const response = await fetch(`/api/table/${tableName}`);
                const data = await response.json();
                
                const tableDataCard = document.getElementById('tableDataCard');
                const tableDataTitle = document.getElementById('tableDataTitle');
                const tableData = document.getElementById('tableData');
                
                tableDataTitle.textContent = `📊 ${tableName} (${data.total} records)`;
                tableDataCard.style.display = 'block';
                
                if (data.data.length === 0) {
                    tableData.innerHTML = '<p>No data found in this table.</p>';
                    return;
                }
                
                // Create table with proper column handling
                let html = '<div class="table-container"><table class="data-table"><thead><tr>';
                Object.keys(data.data[0]).forEach(key => {
                    html += `<th>${key}</th>`;
                });
                html += '</tr></thead><tbody>';
                
                data.data.forEach(row => {
                    html += '<tr>';
                    Object.entries(row).forEach(([key, value]) => {
                        const displayValue = value === null ? '<em>NULL</em>' : 
                                           value === true ? '✅' : 
                                           value === false ? '❌' : 
                                           String(value);
                        
                        // Add appropriate CSS classes based on column type
                        let cellClass = '';
                        if (key.toLowerCase().includes('id')) {
                            cellClass = 'id-column';
                        } else if (key.toLowerCase().includes('status')) {
                            cellClass = 'status-column';
                        } else if (key.toLowerCase().includes('date') || key.toLowerCase().includes('time')) {
                            cellClass = 'date-column';
                        } else if (key.toLowerCase().includes('description') || key.toLowerCase().includes('comment')) {
                            cellClass = 'long-content';
                        }
                        
                        html += `<td class="${cellClass}">${displayValue}</td>`;
                    });
                    html += '</tr>';
                });
                
                html += '</tbody></table></div>';
                tableData.innerHTML = html;
                
            } catch (error) {
                console.error('Error loading table data:', error);
            }
        }

        // Execute custom query
        async function executeCustomQuery() {
            const query = document.getElementById('customQuery').value.trim();
            if (!query) {
                alert('Please enter a query');
                return;
            }
            
            try {
                const response = await fetch('/api/execute-query', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ query })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    // Show results in a new card
                    showQueryResults(query, result);
                } else {
                    alert('Query Error: ' + result.error);
                }
            } catch (error) {
                alert('Error executing query: ' + error.message);
            }
        }

        // Show query results
        function showQueryResults(query, result) {
            const tableDataCard = document.getElementById('tableDataCard');
            const tableDataTitle = document.getElementById('tableDataTitle');
            const tableData = document.getElementById('tableData');
            
            tableDataTitle.textContent = `🔍 Query Results (${result.rowCount} rows)`;
            tableDataCard.style.display = 'block';
            
            if (result.data.length === 0) {
                tableData.innerHTML = '<p>Query executed successfully but returned no results.</p>';
                return;
            }
            
            // Create table with proper column handling
            let html = '<div class="table-container"><table class="data-table"><thead><tr>';
            Object.keys(result.data[0]).forEach(key => {
                html += `<th>${key}</th>`;
            });
            html += '</tr></thead><tbody>';
            
            result.data.forEach(row => {
                html += '<tr>';
                Object.entries(row).forEach(([key, value]) => {
                    const displayValue = value === null ? '<em>NULL</em>' : 
                                       value === true ? '✅' : 
                                       value === false ? '❌' : 
                                       String(value);
                    
                    // Add appropriate CSS classes based on column type
                    let cellClass = '';
                    if (key.toLowerCase().includes('id')) {
                        cellClass = 'id-column';
                    } else if (key.toLowerCase().includes('status')) {
                        cellClass = 'status-column';
                    } else if (key.toLowerCase().includes('date') || key.toLowerCase().includes('time')) {
                        cellClass = 'date-column';
                    } else if (key.toLowerCase().includes('description') || key.toLowerCase().includes('comment')) {
                        cellClass = 'long-content';
                    }
                    
                    html += `<td class="${cellClass}">${displayValue}</td>`;
                });
                html += '</tr>';
            });
            
            html += '</tbody></table></div>';
            tableData.innerHTML = html;
        }

        // Add query to log
        function addQueryToLog(queryEntry) {
            const queryLog = document.getElementById('queryLog');
            const queryItem = document.createElement('div');
            queryItem.className = `query-item ${queryEntry.status} ${queryEntry.source || 'dashboard'}`;
            queryItem.id = `query-${queryEntry.id}`;
            
            const sourceLabel = queryEntry.source === 'snapfix-website' ? '🌐 SnapFix Website' : '📊 Dashboard';
            const sourceColor = queryEntry.source === 'snapfix-website' ? '#4299e1' : '#48bb78';
            
            queryItem.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div><strong>${queryEntry.query}</strong></div>
                    <span style="background: ${sourceColor}; color: white; padding: 2px 6px; border-radius: 3px; font-size: 9px;">${sourceLabel}</span>
                </div>
                <div class="timestamp">${new Date(queryEntry.timestamp).toLocaleString()}</div>
                <div>Status: ${queryEntry.status}</div>
                ${queryEntry.calls ? `<div>Executions: ${queryEntry.calls}</div>` : ''}
            `;
            
            queryLog.insertBefore(queryItem, queryLog.firstChild);
            
            // Update query count
            queryCount++;
            document.getElementById('totalQueries').textContent = queryCount;
            
            // Keep only last 50 entries
            while (queryLog.children.length > 50) {
                queryLog.removeChild(queryLog.lastChild);
            }
        }

        // Update query in log
        function updateQueryInLog(queryEntry) {
            const queryItem = document.getElementById(`query-${queryEntry.id}`);
            if (queryItem) {
                const sourceLabel = queryEntry.source === 'snapfix-website' ? '🌐 SnapFix Website' : '📊 Dashboard';
                const sourceColor = queryEntry.source === 'snapfix-website' ? '#4299e1' : '#48bb78';
                
                queryItem.className = `query-item ${queryEntry.status} ${queryEntry.source || 'dashboard'}`;
                queryItem.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div><strong>${queryEntry.query}</strong></div>
                        <span style="background: ${sourceColor}; color: white; padding: 2px 6px; border-radius: 3px; font-size: 9px;">${sourceLabel}</span>
                    </div>
                    <div class="timestamp">${new Date(queryEntry.timestamp).toLocaleString()}</div>
                    <div>Status: ${queryEntry.status}</div>
                    ${queryEntry.duration ? `<div class="duration">Duration: ${queryEntry.duration}ms</div>` : ''}
                    ${queryEntry.rowCount !== undefined ? `<div>Rows: ${queryEntry.rowCount}</div>` : ''}
                    ${queryEntry.calls ? `<div>Executions: ${queryEntry.calls}</div>` : ''}
                    ${queryEntry.error ? `<div style="color: #f56565;">Error: ${queryEntry.error}</div>` : ''}
                `;
            }
        }

        // Clear query log
        function clearQueryLog() {
            document.getElementById('queryLog').innerHTML = '<div class="query-item">Query log cleared</div>';
            queryCount = 0;
            document.getElementById('totalQueries').textContent = '0';
            socket.emit('clearQueryLog');
        }

        // Handle Enter key in query input
        document.getElementById('customQuery').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.ctrlKey) {
                executeCustomQuery();
            }
        });
    </script>
</body>
</html>
