apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-dashboard
  namespace: snapfix
  labels:
    app: db-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db-dashboard
  template:
    metadata:
      labels:
        app: db-dashboard
    spec:
      containers:
      - name: db-dashboard
        image: your-dockerhub-username/snapfix-db-dashboard:latest
        ports:
        - containerPort: 3001
        env:
        - name: DB_HOST
          value: "postgres-service"
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: snapfix-config
              key: POSTGRES_DB
        - name: DB_USER
          valueFrom:
            configMapKeyRef:
              name: snapfix-config
              key: POSTGRES_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: snapfix-secrets
              key: POSTGRES_PASSWORD
        - name: PORT
          value: "3001"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: db-dashboard-service
  namespace: snapfix
  labels:
    app: db-dashboard
spec:
  selector:
    app: db-dashboard
  ports:
  - port: 3001
    targetPort: 3001
    protocol: TCP
  type: ClusterIP
