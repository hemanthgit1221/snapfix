services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: snapfix-postgres
    environment:
      POSTGRES_DB: snapfix
      POSTGRES_USER: snapfix_user
      POSTGRES_PASSWORD: snapfix_password
      TZ: Asia/Kolkata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - snapfix-network

  # Spring Boot Backend
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: snapfix-backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/snapfix
      SPRING_DATASOURCE_USERNAME: snapfix_user
      SPRING_DATASOURCE_PASSWORD: snapfix_password
      JWT_SECRET: your-super-secret-jwt-key-change-this-in-production
      JWT_EXPIRATION: 86400000
      TZ: Asia/Kolkata
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - postgres
    networks:
      - snapfix-network
    restart: unless-stopped

  # React Frontend
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: snapfix-frontend
    environment:
      REACT_APP_API_URL: http://localhost:8080/api
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - snapfix-network
    restart: unless-stopped

  # Database Dashboard
  db-dashboard:
    build:
      context: ../db-dashboard
      dockerfile: Dockerfile
    container_name: snapfix-db-dashboard
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: snapfix
      DB_USER: snapfix_user
      DB_PASSWORD: snapfix_password
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      - postgres
    networks:
      - snapfix-network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: snapfix-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
      - db-dashboard
    networks:
      - snapfix-network
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:

networks:
  snapfix-network:
    driver: bridge

